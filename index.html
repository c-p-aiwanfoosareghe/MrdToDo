<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Planner Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com"></script>
    <!-- Include the official Supabase JavaScript SDK for Authentication -->
    <script src="https://jsdelivr.net"></script>
</head>
<body>

    <!-- AUTHENTICATION SCREEN -->
    <div id="auth-screen" class="auth-container">
        <div class="auth-box">
            <h2>Welcome to Planner Pro</h2>
            <p>Sign in to sync your data across devices offline.</p>
            <input type="email" id="auth-email" placeholder="Email Address">
            <input type="password" id="auth-password" placeholder="Password">
            <div class="auth-buttons">
                <button onclick="handleLogin()">Login</button>
                <button onclick="handleSignUp()" class="secondary-btn">Sign Up</button>
            </div>
            <p id="auth-error" class="error-text"></p>
        </div>
    </div>

    <!-- MAIN APP LAYOUT (Hidden until logged in) -->
    <div id="app-layout" class="app-layout" style="display: none;">
        <aside class="sidebar">
            <div>
                <h2>Planner Pro</h2>
                <div id="user-display" class="user-display">Loading profile...</div>
                <nav>
                    <button onclick="switchTab('tasks')">📋 Tasks</button>
                    <button onclick="switchTab('calendar')">📅 Calendar</button>
                    <button onclick="switchTab('pomodoro')">⏱️ Pomodoro</button>
                    <button onclick="switchTab('notes')">📝 Notes</button>
                </nav>
            </div>
            <div>
                <div id="sync-status" class="sync-status">Offline Mode</div>
                <button onclick="handleLogout()" class="logout-btn">Log Out</button>
            </div>
        </aside>

        <main class="main-content">
            <!-- TASKS TAB -->
            <section id="tab-tasks" class="tab-content active">
                <h3>Task Manager</h3>
                <div class="planner-form">
                    <input type="text" id="task-text" placeholder="What needs to be done?">
                    <select id="task-recurrence">
                        <option value="none">One-time</option>
                        <option value="daily">Daily</option>
                        <option value="weekly">Weekly</option>
                    </select>
                    <input type="datetime-local" id="task-reminder">
                    <button onclick="addNewTask()">Add Task</button>
                </div>
                <ul id="task-list" class="display-list"></ul>
            </section>

            <!-- CALENDAR TAB -->
            <section id="tab-calendar" class="tab-content">
                <h3>Calendar Grid</h3>
                <div class="calendar-controls">
                    <button onclick="changeMonth(-1)">◀</button>
                    <span id="calendar-month-year"></span>
                    <button onclick="changeMonth(1)">▶</button>
                </div>
                <div class="calendar-grid" id="calendar-grid"></div>
            </section>

            <!-- POMODORO TAB -->
            <section id="tab-pomodoro" class="tab-content">
                <h3>Pomodoro Timer</h3>
                
                <!-- Customized Settings Form -->
                <div class="timer-settings">
                    <label>Work: <input type="number" id="cfg-work" value="25" min="1">m</label>
                    <label>Short Break: <input type="number" id="cfg-short" value="5" min="1">m</label>
                    <label>Long Break: <input type="number" id="cfg-long" value="15" min="1">m</label>
                    <button onclick="applyTimerSettings()">Apply Settings</button>
                </div>

                <div class="timer-box">
                    <div class="timer-modes">
                        <button onclick="setTimerMode('work')" id="mode-work" class="active-mode">Work</button>
                        <button onclick="setTimerMode('short')" id="mode-short">Short Break</button>
                        <button onclick="setTimerMode('long')" id="mode-long">Long Break</button>
                    </div>
                    <div id="timer-display">25:00</div>
                    <div class="timer-controls">
                        <button id="timer-start" onclick="toggleTimer()">Start</button>
                        <button onclick="resetTimer()">Reset</button>
                    </div>
                </div>
            </section>

            <!-- NOTES TAB -->
            <section id="tab-notes" class="tab-content">
                <h3>Scratchpad Notes</h3>
                <div class="planner-form">
                    <input type="text" id="note-title" placeholder="Note Title...">
                    <textarea id="note-body" placeholder="Write something deep..."></textarea>
                    <button onclick="addNewNote()">Save Note</button>
                </div>
                <div id="notes-container" class="notes-grid"></div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
